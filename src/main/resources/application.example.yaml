# ========================================================
# CẤU HÌNH BACKEND CLOTHES API (TEMPLATE)
# ========================================================
# File cấu hình mẫu dùng làm tham chiếu để tạo các file
# cấu hình cho từng môi trường triển khai.
#
# CÁCH SỬ DỤNG
#   1. Copy file này để tạo cấu hình cho từng môi trường:
#        - application-local.yaml   (phát triển local)
#        - application-docker.yaml  (chạy trong Docker)
#
#   2. KHÔNG commit file cấu hình có chứa secret lên Git.
#
#   3. Dùng Environment Variables hoặc Secret Manager
#      để quản lý thông tin nhạy cảm.
# ========================================================


# == SPRING ==============================================
spring:
  application:
    # Tên ứng dụng, dùng trong log, metrics và monitoring
    name: ${APP_NAME:clothes}

  # -- Database (MySQL) --
  datasource:
    # JDBC connection URL — format: jdbc:mysql://host:port/database
    url: >-
      jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:clothes_db}
      ?createDatabaseIfNotExist=${DB_CREATE_IF_NOT_EXIST:true}
      &useSSL=${DB_USE_SSL:false}
      &serverTimezone=${DB_TIMEZONE:Asia/Ho_Chi_Minh}
      &allowPublicKeyRetrieval=true

    # Thông tin đăng nhập — nên truyền qua environment variable ở production
    username: ${DB_USERNAME:clothes_user}
    password: ${DB_PASSWORD:password}

    # JDBC driver cho MySQL 8+
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      # Số connection tối đa trong pool
      maximum-pool-size: ${DB_POOL_SIZE:10}

      # Số connection idle tối thiểu luôn được giữ sẵn
      minimum-idle: ${DB_POOL_MIN_IDLE:5}

      # Thời gian tối đa chờ lấy connection từ pool trước khi throw exception (ms)
      connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}

      # Thời gian tối đa một connection được phép idle trước khi bị đóng (ms)
      idle-timeout: ${DB_IDLE_TIMEOUT:600000}

      # Thời gian sống tối đa của một connection, sau đó sẽ bị thay thế (ms)
      max-lifetime: ${DB_MAX_LIFETIME:1800000}

      # Query dùng để kiểm tra connection còn hoạt động
      connection-test-query: ${DB_TEST_QUERY:SELECT 1}

  # -- JPA / Hibernate --
  jpa:
    hibernate:
      # validate: kiểm tra schema khớp với entity, không tự tạo hay sửa
      # Bắt buộc dùng validate khi quản lý schema bằng Flyway hoặc Liquibase
      ddl-auto: validate

    # In SQL ra log để debug — tắt ở production
    show-sql: ${JPA_SHOW_SQL:false}

    properties:
      hibernate:
        # Format SQL cho dễ đọc trong log
        format_sql: true

        # Dialect tương ứng với phiên bản MySQL đang dùng
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}

        # Thêm comment mô tả vào câu SQL do Hibernate generate
        use_sql_comments: ${HIBERNATE_SQL_COMMENTS:true}

        jdbc:
          # Số statement gom vào một batch khi thực thi
          batch_size: ${HIBERNATE_BATCH_SIZE:20}

          # Sắp xếp lại thứ tự INSERT/UPDATE để tối ưu hiệu quả batch
          order_inserts: ${HIBERNATE_ORDER_INSERTS:true}
          order_updates: ${HIBERNATE_ORDER_UPDATES:true}

  # -- Flyway --
  flyway:
    # Bật/tắt Flyway để quản lý migration database
    enabled: true

    # Tự động tạo baseline cho database đã tồn tại
    # Dùng khi tích hợp Flyway vào hệ thống đã có sẵn schema
    baseline-on-migrate: true

    # Đường dẫn chứa các file migration
    # Mặc định: classpath:db/migration
    locations: ${FLYWAY_LOCATIONS:classpath:db/migration}

    # Kiểm tra tính toàn vẹn của migration trước khi chạy
    # Ngăn việc chạy khi file migration bị sửa hoặc không đồng bộ
    validate-on-migrate: true

    # Không cho phép chạy migration sai thứ tự version
    # Nên giữ false ở production để đảm bảo tính nhất quán
    out-of-order: false

    # Vô hiệu hóa lệnh clean (xóa toàn bộ schema)
    # Tránh mất dữ liệu ngoài ý muốn — nên luôn bật ở production
    clean-disabled: true

  # -- Servlet Encoding --
  servlet:
    encoding:
      # Encoding mặc định cho toàn bộ request và response
      charset: UTF-8

      # Bật filter encoding
      enabled: true

      # Ép dùng charset trên, kể cả khi client khai báo encoding khác trong header
      force: true

  # -- Error Handling --
  web:
    error:
      # Ẩn message exception — tránh lộ thông tin nội bộ ra client
      include-message: never

      # Ẩn chi tiết lỗi binding/validation
      include-binding-errors: never

      # Ẩn stacktrace — tuyệt đối không để lộ ở production
      include-stacktrace: never

  # -- MAIL --
  mail:
    # Địa chỉ SMTP server
    # Một số nhà cung cấp phổ biến:
    #   - Gmail: smtp.gmail.com
    #   - Outlook: smtp-mail.outlook.com
    #   - Yahoo: smtp.mail.yahoo.com
    host: ${MAIL_HOST:smtp.gmail.com}

    # Cổng SMTP
    # Các cổng phổ biến:
    #   - 587: TLS/STARTTLS (khuyến nghị)
    #   - 465: SSL
    #   - 25: Không mã hóa (KHÔNG khuyến nghị)
    port: ${MAIL_PORT:587}

    # Username để xác thực SMTP (thường là email)
    username: ${MAIL_USERNAME:your-email@gmail.com}

    # Password để xác thực SMTP
    # Với Gmail: dùng App Password, KHÔNG dùng mật khẩu thường
    # Với nhà cung cấp khác: dùng app password hoặc password thường
    # CẢNH BÁO: Không commit password thật lên Git!
    password: ${MAIL_PASSWORD:your-app-password}

    # Các cấu hình bổ sung cho SMTP
    properties:
      # Bật xác thực SMTP
      mail.smtp.auth: ${MAIL_SMTP_AUTH:true}

      # Bật STARTTLS (nâng cấp kết nối lên TLS)
      # Bắt buộc khi dùng port 587
      mail.smtp.starttls.enable: ${MAIL_STARTTLS_ENABLE:true}

      # Timeout khi kết nối tới SMTP server (ms)
      # Thời gian tối đa chờ kết nối
      mail.smtp.connection-timeout: ${MAIL_CONNECTION_TIMEOUT:5000}

      # Timeout khi đọc dữ liệu từ SMTP server (ms)
      # Thời gian tối đa chờ phản hồi
      mail.smtp.timeout: ${MAIL_TIMEOUT:5000}

      # Timeout khi ghi dữ liệu tới SMTP server (ms)
      # Thời gian tối đa gửi dữ liệu
      mail.smtp.write-timeout: ${MAIL_WRITE_TIMEOUT:5000}

  security:
    oauth2:
      client:
        registration:
          # =======================
          # Google OAuth2 Client
          # =======================
          google:
            # Client ID do Google cấp khi tạo OAuth app
            client-id: ${GOOGLE_CLIENT_ID:changeme-google-client-id}

            # Client Secret do Google cấp
            client-secret: ${GOOGLE_CLIENT_SECRET:changeme-google-client-secret}

            # Quyền truy cập yêu cầu từ người dùng
            # email → email user, profile → tên, ảnh đại diện
            scope: ${GOOGLE_SCOPES:email,profile}

            # URL Google redirect về sau khi user login thành công
            # {baseUrl} sẽ được Spring Boot tự resolve thành scheme + host + port của app
            redirect-uri: "{baseUrl}/login/oauth2/code/google"

            # Tên client hiển thị trong logs hoặc UI nếu cần
            client-name: Google

  data:
    redis:
      # Địa chỉ Redis (localhost / redis / IP server)
      host: ${REDIS_HOST:localhost}

      # Port Redis (mặc định 6379)
      port: ${REDIS_PORT:6379}

      # Password (nếu có, nội bộ có thể để trống)
      password: ${REDIS_PASSWORD:}

      # Thời gian chờ phản hồi từ Redis (vd: 2000ms = 2s)
      timeout: 2000ms

# == SERVER ==============================================
server:
  # Port lắng nghe HTTP request
  port: ${SERVER_PORT:8080}

  # -- Tomcat --
  tomcat:
    threads:
      # Số thread worker tối đa xử lý request đồng thời
      max: ${SERVER_MAX_THREADS:200}

      # Số thread tối thiểu luôn được giữ sẵn, tránh delay khởi tạo
      min-spare: ${SERVER_MIN_THREADS:20}

    # Số TCP connection tối đa server chấp nhận cùng lúc
    max-connections: ${SERVER_MAX_CONNECTIONS:1000}

    # Số request tối đa được queue khi toàn bộ thread đang bận
    accept-count: ${SERVER_ACCEPT_COUNT:100}

    # Thời gian tối đa chờ client gửi request sau khi kết nối TCP (ms)
    connection-timeout: ${SERVER_CONNECTION_TIMEOUT:5000}

  servlet:
    # Base path cho toàn bộ API
    context-path: ${SERVER_CONTEXT_PATH:/api/clothes}

  # Chiến lược xử lý các header được forward từ proxy (ví dụ: X-Forwarded-For, X-Forwarded-Proto)
  forward-headers-strategy: framework

# == APPLICATION =========================================
application:
  # -- Security --
  security:
    # Cấu hình xác thực JWT (JSON Web Token)
    jwt:
      # Khóa bí mật dùng để ký và xác thực token
      # CẢNH BÁO: BẮT BUỘC phải thay bằng giá trị ngẫu nhiên mạnh khi chạy production!
      # Độ dài khuyến nghị tối thiểu: 256 bit (32 ký tự)
      secret: ${JWT_SECRET:MySuperSecretKeyForJwtThatIsAtLeast32CharsLong}

      # Cấu hình access token
      access:
        # Thời gian hết hạn của access token (định dạng ISO-8601 Duration)
        # Format: PT[giờ]H[phút]M[giây]S
        # Ví dụ: PT15M (15 phút), PT1H (1 giờ), PT30M (30 phút)
        # Khuyến nghị: thời gian ngắn (5-15 phút) để tăng bảo mật
        expiration: ${JWT_ACCESS_EXPIRATION:PT10M}

      # Cấu hình refresh token
      refresh:
        # Thời gian hết hạn của refresh token (định dạng ISO-8601 Duration)
        # Format: P[ngày]D hoặc PT[giờ]H
        # Ví dụ: P7D (7 ngày), P30D (30 ngày), PT24H (24 giờ)
        # Khuyến nghị: thời gian dài hơn (7-30 ngày) để tránh phải đăng nhập lại thường xuyên
        expiration: ${JWT_REFRESH_EXPIRATION:P7D}

      # Cấu hình token đặt lại mật khẩu
      reset-password:
        # Thời gian hết hạn của token đặt lại mật khẩu (định dạng ISO-8601 Duration)
        # Format: PT[giờ]H[phút]M
        # Ví dụ: PT15M (15 phút), PT30M (30 phút), PT1H (1 giờ)
        # Khuyến nghị: thời gian ngắn (15-30 phút) để đảm bảo bảo mật
        expiration: ${JWT_RESET_PASSWORD_EXPIRATION:PT15M}

      # Định danh hệ thống phát hành JWT (issuer - claim 'iss')
      # Dùng để xác định hệ thống đã tạo ra token
      issuer: ${JWT_ISSUER:Clothes-API}

  # -- CORS --
  cors:
    # Danh sách origin được phép gọi API — dùng dấu phẩy để khai báo nhiều origin
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://yourdomain}

    # HTTP method được phép trong CORS request
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS,PATCH}

    # Header được phép gửi trong request — dùng * để cho phép tất cả
    allowed-headers: ${CORS_ALLOWED_HEADERS:*}

    # Cho phép gửi credentials như cookie hoặc Authorization header
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}

    # Thời gian browser cache kết quả preflight request
    # PT1H = 1 giờ | PT30M = 30 phút
    max-age: ${CORS_MAX_AGE:PT1H}

  storage:
    cloudinary:
      # Tên cloud (cloud name) trong Cloudinary account
      # Dùng để xác định tài khoản lưu trữ media
      cloudName: ${CLOUDINARY_CLOUD_NAME:your-cloud-name}

      # API Key dùng để xác thực khi gọi Cloudinary API
      apiKey: ${CLOUDINARY_API_KEY:your-api-key}

      # API Secret dùng để ký request (bảo mật)
      apiSecret: ${CLOUDINARY_API_SECRET:your-api-secret}

  # -- OTP (One-Time Password) --
  otp:
    # Độ dài của mã OTP (số ký tự)
    length: ${OTP_LENGTH:6}

    # Thời gian hết hạn của OTP (phút)
    ttl: ${OTP_TTL:5}

    # Số lần nhập sai tối đa trước khi OTP bị vô hiệu hóa
    # Khi vượt quá giới hạn này, OTP sẽ bị xóa khỏi hệ thống
    max-attempts: ${OTP_MAX_ATTEMPTS:5}

    # Thời gian chờ giữa các lần gửi lại OTP (giây)
    # Dùng để chống spam gửi OTP liên tục
    resend-cooldown: ${OTP_RESEND_COOLDOWN:60}