name: CD pipeline

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
      - 'docs/**'
  workflow_dispatch:

jobs:
  build:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create application-docker.yml from example
        run: |
          cp src/main/resources/application.example.yaml \
             src/main/resources/application-docker.yaml

      - name: Login Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build & Push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/clothes-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/clothes-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.prod.yml,.env.example"
          target: ${{ secrets.SERVER_DEPLOY_PATH }}

      - name: SSH & Deploy
        uses: appleboy/ssh-action@v1
        env:
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
          ADMIN_EMAIL: ${{secrets.ADMIN_EMAIL}}
          ADMIN_PASSWORD: ${{secrets.ADMIN_PASSWORD}}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          VNPAY_TMN_CODE: ${{ secrets.VNPAY_TMN_CODE }}
          VNPAY_HASH_SECRET: ${{ secrets.VNPAY_HASH_SECRET }}
          VNPAY_RETURN_URL: ${{ secrets.VNPAY_RETURN_URL }}
          VNPAY_IPN_URL: ${{ secrets.VNPAY_IPN_URL }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: >-
            DB_USERNAME,DB_PASSWORD,DB_ROOT_PASSWORD,
            ADMIN_EMAIL,ADMIN_PASSWORD,
            JWT_SECRET,
            MAIL_USERNAME,MAIL_PASSWORD,
            CORS_ALLOWED_ORIGINS,
            CLOUDINARY_CLOUD_NAME,CLOUDINARY_API_KEY,CLOUDINARY_API_SECRET,
            GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,
            VNPAY_TMN_CODE,VNPAY_HASH_SECRET,VNPAY_RETURN_URL,VNPAY_IPN_URL
          script: |
            cd ${{ secrets.SERVER_DEPLOY_PATH }}

            cp .env.example .env

            python3 << 'PYEOF'
            import os, re

            overrides = [
                'DB_USERNAME', 'DB_PASSWORD', 'DB_ROOT_PASSWORD',
                'ADMIN_EMAIL', 
            'ADMIN_PASSWORD',
                'JWT_SECRET',
                'MAIL_USERNAME', 'MAIL_PASSWORD',
                'CORS_ALLOWED_ORIGINS',
                'CLOUDINARY_CLOUD_NAME', 'CLOUDINARY_API_KEY', 'CLOUDINARY_API_SECRET',
                'GOOGLE_CLIENT_ID', 'GOOGLE_CLIENT_SECRET',
                'VNPAY_TMN_CODE', 'VNPAY_HASH_SECRET', 'VNPAY_RETURN_URL', 'VNPAY_IPN_URL',
            ]

            with open('.env', 'r') as f:
                content = f.read()

            for key in overrides:
                value = os.environ.get(key, '')
                content = re.sub(
                    rf'^{re.escape(key)}=.*',
                    lambda m, k=key, v=value: f'{k}={v}',
                    content,
                    flags=re.MULTILINE
                )

            with open('.env', 'w') as f:
                f.write(content)
            PYEOF

            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d --no-build
            docker image prune -f
