name: CD pipeline

on:
  push:
    branches: [feat/ci-cd-setup]

jobs:
  build:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create application-docker.yml to example
        run: |
          cp src/main/resources/application.example.yaml \
             src/main/resources/application-docker.yaml

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/clothes-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/clothes-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max